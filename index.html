<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Drops for Hope</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="game-wrapper">

    <h1 class="game-title">Drops for Hope</h1>

    <p class="game-tagline">
      Collect clean water drops and avoid dirty water to help bring clean water to communities around the world!
    </p>

    <div class="score-panel">

      <div class="score">
        Score: <span id="score">0</span>
      </div>

      <div class="timer">
        Time: <span id="time">30</span>s
      </div>

      <button id="start-btn">Start Game</button>

      <button id="reset-btn">Reset Game</button>

    </div>

    <div id="game-container"></div>

    <p id="feedback"></p>

  </div>

  <script src="script.js"></script>

</body>
</html>
